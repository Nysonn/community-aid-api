services:
  api:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - APP_ENV
      - PORT
      - DB_URL
      - CLOUDINARY_CLOUD_NAME
      - CLOUDINARY_API_KEY
      - CLOUDINARY_API_SECRET
      - RESEND_API_KEY
      - CLERK_SECRET_KEY
      - CLERK_PUBLISHABLE_KEY
